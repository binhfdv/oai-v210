tractor-kpm-oai:
  enabled: true
  fullnameOverride: "tractor-kpm-oai"
  nodeSelector:
    node-role: core
  env:
    ORCH_HOST: xchain-smartgw
    ORCH_PORT: "4200"

tractor-kpm-simu:
  enabled: false
  fullnameOverride: "tractor-kpm-simu"
  nodeSelector:
    node-role: core
  env:
    ORCH_HOST: tractor-mono

tractor-orchestrator:
  enabled: true
  fullnameOverride: "tractor-orchestrator"
  nodeSelector:
    node-role: core
  image:
    tag: dev
  env:
    T: "32"

tractor-normalizer:
  enabled: true
  fullnameOverride: "tractor-normalizer"
  nodeSelector:
    node-role: core
  persistentVolume:
    hostPath:: /home/lapdk/workspace/oai-v210/tractor/src/xapp/models
  env:
    T: "32"

tractor-buffer:
  enabled: true
  fullnameOverride: "tractor-buffer"
  nodeSelector:
    node-role: core

tractor-model:
  enabled: true
  fullnameOverride: "tractor-model"
  nodeSelector:
    node-role: core
  persistentVolume:
    hostPath:: /home/lapdk/workspace/oai-v210/tractor/src/xapp/models
  volumeMounts:
    model:
      subPath: model.32.cnn.pt

tractor-mono:
  enabled: false
  fullnameOverride: "tractor-mono"
  nodeSelector:
    node-role: core
  persistentVolume:
    model:
      hostPath: /home/lapdk/workspace/oai-v210/tractor/src/xapp/models
    norm:
      hostPath: /home/lapdk/workspace/oai-v210/tractor/src/xapp/models
  env:
    T: "4"
  volumeMounts:
    model:
      subPath: model.4.cnn.pt

xchain-smartgw:
  enabled: true
  fullnameOverride: "xchain-smartgw"
  nodeSelector:
    node-role: core
  persistentVolume:
    hostPath: /home/lapdk/workspace/oai-v210/tractor/src/smartGW
  env:
    TRACTOR_HOST: tractor-orchestrator
    TRACTOR_PORT: "4300"
    XCHAIN_HOST: xchain-model
    XCHAIN_PORT: "4400"
  persistentVolume:
    subPath: smartgw_2c.pkl

xchain-model:
  enabled: true
  fullnameOverride: "xchain-model"
  nodeSelector:
    node-role: core
  persistentVolume:
    hostPath: /home/lapdk/workspace/oai-v210/tractor/src/xapp-fast
    subPath: xgb_model_T_4.json
  env:
    T: "4"