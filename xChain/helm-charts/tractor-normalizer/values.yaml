replicaCount: 1

image:
  pullPolicy: IfNotPresent
  repository: ddocker122/tractor-xapp-normalizer
  tag: latest

fullnameOverride: "tractor-normalizer"

service:
  port: 5002

serviceAccount:
  annotations: {}
  automount: true
  create: true
  name: ''

volumeMounts:
  norm:
    mountPath: /mnt/model/norm.pkl
    subPath: cols_maxmin.pkl

persistentVolume:
  enabled: true
  name: tractor-normalizer-pv
  claimName: tractor-normalizer-pvc
  size: 1Gi
  accessMode: ReadWriteMany
  hostPath: /home/lapdk/workspace/oai-v210/xChain/src/xapp/models
  reclaimPolicy: Delete

env:
  T: "16"

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
