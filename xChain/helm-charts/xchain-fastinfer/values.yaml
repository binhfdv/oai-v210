replicaCount: 1

image:
  repository: ddocker122/xchain-fastinfer
  tag: latest
  pullPolicy: IfNotPresent

fullnameOverride: "xchain-fastinfer"

serviceAccount:
  create: true
  name: "xchain-fastinfer-sa"
  automount: true
  annotations: {}

serviceType: ClusterIP

service:
  - name: kpm-http
    containerPort: 4400
  - name: model-http
    containerPort: 5001

env:
  MODEL_PATH: /mnt/model/xgb_model.json
  XCHAIN_DATA_PORT: "4400"
  T: "4"

persistentVolume:
  enabled: true
  name: xchain-fastinfer-pv
  claimName: xchain-fastinfer-pvc
  size: 1Gi
  accessMode: ReadWriteMany
  mountPath: /mnt/model/xgb_model.json
  hostPath: /home/lapdk/workspace/oai-v210/tractor/src/xapp-fast
  reclaimPolicy: Delete
  subPath: xgb_model_T_4.json

resources: {}
nodeSelector: {}
affinity: {}
tolerations: []
