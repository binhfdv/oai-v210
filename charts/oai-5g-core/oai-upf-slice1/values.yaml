kubernetesDistribution: Vanilla  #Vanilla for community kubernetes distribution else Openshift for Openshift
clusterIpServiceIpAllocation: true #this will allocate ip-address to cluster Ip service
waitForNRF: true
waitForUDR: true
http2Param: "--http2-prior-knowledge"  # if waitForNRF is true and http2 is used for all NF then this param is needed
timeout: 1
## In case of using these charts on Openshift then please use UBI images
## To know more about them follow this tutorial https://gitlab.eurecom.fr/oai/cn5g/oai-cn5g-fed/-/tree/master/openshift
nfimage:
  repository: docker.io/oaisoftwarealliance/oai-upf # dockerhub oaisoftwarealliance/oai-upf-slice1
  version: v2.1.0
  # pullPolicy: IfNotPresent or Never or Always
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: "regcred"

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: "oai-upf-slice1-sa"

podSecurityContext:
  runAsUser: 0
  runAsGroup: 0

#service type is fixed to clusterIP, it is only support for non multus interface (eth0)
exposedPorts:
  sbi: 80
  n4: 8805 # default port no need to change unless necessary
  n3: 2152 # default port no need to change unless necessary

# oai-upf-slice1 can be configured with multiple interface which may correspond to 3GPP logical interfaces. There can be one to one or one to many. 
# In case of one to one mapping n3,n4,n6 all can have separate virtual interfaces. 
# In one to many mapping n3,n4,n6 all can be mapped to one virtual interface. 
# Interface mapping is strictly based on your networking environment 
## Change these ip-addresses according to your environment 

multus:
  ## If you don't want to add a default route in your pod then leave this field empty
  defaultGateway: ""
  n3Interface: # use this interface if using one interface for all 3GPP interfaces
    create: true
    ipAdd: "10.1.3.18"
    netmask: "22"
    name: "n3"
    ## If you do not have a gateway leave the field empty
    gateway: ""
    ## If you do not want to add any routes in your pod then leave this field empty
    routes: ""
    hostInterface: "enp1s0f0"
  n4Interface:
    create: true
    ipAdd: "10.3.2.17"
    netmask: "24"
    name: "n4"
    ## If you do not have a gateway leave the field empty
    gateway: ""
    ## If you do not want to add any routes in your pod then leave this field empty
    routes: ""
    hostInterface: "enp1s0f0"
  n6Interface:
    create: true
    ipAdd: "10.1.2.51"
    name: "n6"
    netmask: "24"
    ## If you do not have a gateway leave the field empty
    gateway: ""
    ## If you do not want to add any routes in your pod then leave this field empty
    routes: ""
    hostInterface: "enp1s0f0"
  a1Interface:
    create: true
    ipAdd: "192.168.80.11"
    netmask: "24"
    name: "a1"
    hostInterface: "enp1s0f0"

## Debugging section
start:
  spgwu: true #If false the network function container will run in sleep mode for manually testing
  tcpdump: false

includeTcpDumpContainer: false #If true it will add a tcpdump container inside network function pod for debugging

tcpdumpimage:
  repository: docker.io/oaisoftwarealliance/oai-tcpdump-init
  version: alpine-3.20
  #pullPolicy: IfNotPresent or Never or Always
  pullPolicy: IfNotPresent

securityContext:
  privileged: true

#To store PCAP of NF in a sharedVolume so it can be easily fetched (PVC is created with NRF charts so make sure in NRF it is true)
persistent:
  sharedvolume: false

## NF is the network function and tcpdump is the tcpdump container. 
## To know more about request and limit it is better to understand that how Kubernetes QoS works. 
## https://kubernetes.io/docs/concepts/configuration/manage-resources-containers
## https://kubernetes.io/docs/concepts/workloads/pods/pod-qos
resources:
  define: false
  limits:
    nf:
      cpu: 100m
      memory: 128Mi
    #If tcpdump container is disabled this value will not be used
    tcpdump:
      cpu: 100m
      memory: 128Mi
  requests:
    nf:
      cpu: 100m
      memory: 128Mi
    #If tcpdump container is disabled this value will not be used
    tcpdump:
      cpu: 100m
      memory: 128Mi

readinessProbe: true

livenessProbe: false

terminationGracePeriodSeconds: 5

nodeSelector:
  node-role: core

nodeName:

persistentVolume:
  enabled: true
  name: atd-pv-1
  claimName: atd-pvc-1
  size: 1Gi
  accessMode: ReadWriteOnce
  hostPath: /home/lapdk/workspace/oai-v210/oai-anomaly-detection
  reclaimPolicy: Delete
  mountPath: /oai-anomaly-detection

pktserver:
  enabled: true
  image: ttsourdinis/custom-upf
  version: slice1
  pullPolicy: IfNotPresent
